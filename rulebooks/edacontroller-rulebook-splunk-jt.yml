---
- name: Listen for alert notifications from Splunk
  hosts: localhost
  ## Listening on port 5000.
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
      ## Checking for Organization modification Alert
    - name: AAP Organization Modified
      condition: event.payload.results.index == 'aap' and event.payload.results.message == 'Activity Stream update entry for organization'
      # Modify the RBAC role for the organization
      actions:
        - debug:
            msg: "{{ event.payload.results['operation'] }} an organization by the
                   name of {{ event.payload.results['changes.name'] }} and id
                   of {{ event.payload.results['changes.id'] }}"
        - run_job_template:
            name: EDADemo-action-splunk-modify-team-role
            organization: "{{ job_templates_org_name | default('Foxhound') }}"
            job_args:
              extra_vars:
                org_operation: "{{ event['payload']['results']['operation'] }}"
                org_name: "{{ event['payload']['results']['changes.name'] }}"
                org_id: "{{ event['payload']['results']['changes.id'] }}"

    - name: SSH Bruteforce Attack Detected
      condition: event.payload.search_name is defined and event.payload.search_name == 'ssh_bruteforce_eda'
      # Modify the RBAC role for the organization
      actions:
        - debug:
            msg: "{{ event.payload.results['host'] }}:{{ event.payload.results['user'] }}@{{ event.payload.results['src_ip'] }}"
        - run_workflow_template:
            name: WF_EDA_Action_Splunk_report_and_isolate_host
            organization: "{{ job_templates_org_name | default('Foxhound') }}"
            job_args:
              limit: "{{ event.payload.results['host'] }}"
              extra_vars:
                reported_saturation_problem_type: "{{ event.title }}"
                reporting_host: "{{ event.payload.results['host'] }}"
                snow_inc_short_desc: "SSH Bruteforce attck detected on: {{ event.payload.results['host'] }}"
                snow_inc_desc: "An SSH Bruteforce attack was detected on Reported on {{ event.payload.results['host'] }} coming from source IP {{ event.payload.results['src_ip'] }} with user {{ event.payload.results['user'] }}."
                snow_inc_urgency: "{{ snow_inc_urgency_choice | default('medium') }}"
                snow_inc_impact: "{{ snow_inc_impact_choice | default('medium') }}"

    - name: Catchall
      condition: event.payload is defined
      # Modify the RBAC role for the organization
      actions:
        - debug:
            msg: "{{ event }}"
